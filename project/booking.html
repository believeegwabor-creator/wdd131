<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book a laundry pickup with KingsMen Laundry Services.">
    <title>KingsMen Laundry Services | Book Pickup</title>

<link rel="stylesheet" href="css/styles.css">
<script src="js/script.js" defer></script>

</head>
<body>

<header>
    <div class="logo">
        <h1>KingsMen Laundry Services</h1>
    </div>

<nav>
    <ul class="navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="booking.html" class="active">Book Pickup</a></li>
    </ul>
</nav>

</header>

<main>

<section class="page-banner">
    <h2>Schedule a Laundry Pickup</h2>
    <p>
        Fill out the form below and we'll contact you to confirm your pickup.
    </p>
</section>

<section class="form-section">

    <form id="bookingForm">

        <label for="customerName">Full Name</label>
        <input
            type="text"
            id="customerName"
            name="customerName"
            required>

        <label for="phone">Phone Number</label>
        <input
            type="tel"
            id="phone"
            name="phone"
            required>

        <label for="address">Pickup Address</label>
        <textarea
            id="address"
            name="address"
            rows="4"
            required></textarea>

        <label for="service">Service Needed</label>
        <select id="service" name="service" required>
            <option value="">Select a Service</option>
            <option value="Wash & Fold">Wash & Fold</option>
            <option value="Dry Cleaning">Dry Cleaning</option>
            <option value="Ironing">Ironing</option>
            <option value="Pickup & Delivery">Pickup & Delivery</option>
        </select>

        <label for="weight">Estimated Weight (kg)</label>
        <input
            type="number"
            id="weight"
            name="weight"
            min="1"
            required>

        <button type="submit" class="btn">
            Submit Booking
        </button>

    </form>

    <div id="bookingMessage"></div>

</section>

<section class="saved-bookings">
    <h2>Recent Bookings</h2>

    <div id="bookingList">
        <!-- JavaScript displays saved bookings here -->
    </div>
</section>

</main>

<footer>
    <p>&copy; 2026 KingsMen Laundry Services</p>

<p id="lastModified"></p>

<a href="references.html">References</a>

</footer>

</body>
</html>
